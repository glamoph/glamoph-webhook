<script>
const el = {
  publishForm: document.getElementById('publishForm'),
  copyJsonBtn: document.getElementById('copyJsonBtn'),
  openArchiveBtn: document.getElementById('openArchiveBtn'),

  artworkCode: document.getElementById('artworkCode'),
  sku: document.getElementById('sku'),
  size: document.getElementById('size'),
  editionNumber: document.getElementById('editionNumber'),
  title: document.getElementById('title'),
  image: document.getElementById('image'),
  artist: document.getElementById('artist'),
  frame: document.getElementById('frame'),
  medium: document.getElementById('medium'),

  preview: document.getElementById('preview'),
  result: document.getElementById('result'),

  // NEW
  orderId: document.getElementById('orderId'),
  loadOrderBtn: document.getElementById('loadOrderBtn'),
  orderLoadStatus: document.getElementById('orderLoadStatus')
};

// =============================
// Helpers
// =============================

function pad2(n) {
  return String(n).padStart(2, '0');
}

function pad3(n) {
  return String(n).padStart(3, '0');
}

function extractArtworkCodeFromSku(sku) {
  if (!sku) return '';
  const parts = String(sku).trim().toUpperCase().split('-');
  return parts[1] || '';
}

function extractSizeFromSku(sku) {
  if (!sku) return '';
  const parts = String(sku).trim().toUpperCase().split('-');
  return parts[2] || '';
}

// =============================
// Preview
// =============================

function buildPreviewDraft() {
  const artworkCode = el.artworkCode.value || '';
  const size = el.size.value || 'S';
  const edition = Number(el.editionNumber.value || 1);

  const editionMap = { S: 50, M: 30, L: 10 };
  const total = editionMap[size] || 50;

  const artworkId = `GLA-${artworkCode}-${size}-${pad3(edition)}`;

  return {
    title: el.title.value,
    artworkId,
    edition: `Edition ${pad2(edition)} / ${total}`,
    image: el.image.value
  };
}

function renderPreview(data) {
  if (!el.preview) return;
  el.preview.textContent = JSON.stringify(data, null, 2);
}

// =============================
// Apply Draft
// =============================

function applyOrderDraftToForm(draft) {
  if (!draft) return;

  el.sku.value = draft.sku || '';
  el.artworkCode.value = draft.artworkCode || '';
  el.title.value = draft.title || '';
  el.size.value = draft.size || '';
  el.image.value = draft.image || '';
  el.artist.value = draft.artist || 'GLAMOPH';
  el.frame.value = draft.frame || 'Black';
  el.medium.value = draft.medium || 'Archival pigment print on fine art paper';

  renderPreview(buildPreviewDraft());
}

// =============================
// Load Order
// =============================

async function loadOrderDetail() {
  const orderId = String(el.orderId.value || '').trim();

  if (!orderId) {
    el.orderLoadStatus.textContent = 'Please enter Order ID';
    el.orderLoadStatus.className = 'status error';
    return;
  }

  el.orderLoadStatus.textContent = 'Loading...';

  try {
    const res = await fetch(`/admin/order-detail?orderId=${orderId}`);
    const data = await res.json();

    if (!data.ok) throw new Error(data.error);

    applyOrderDraftToForm(data.draft);

    el.orderLoadStatus.textContent = 'Loaded successfully';
    el.orderLoadStatus.className = 'status success';
  } catch (err) {
    el.orderLoadStatus.textContent = err.message;
    el.orderLoadStatus.className = 'status error';
  }
}

// =============================
// Publish
// =============================

async function publishRecord(e) {
  e.preventDefault();

  const payload = {
    artworkCode: el.artworkCode.value,
    sku: el.sku.value,
    size: el.size.value,
    editionNumber: el.editionNumber.value,
    title: el.title.value,
    image: el.image.value,
    artist: el.artist.value,
    frame: el.frame.value,
    medium: el.medium.value
  };

  const res = await fetch('/api/publish', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  el.result.textContent = JSON.stringify(data, null, 2);
}

// =============================
// Events
// =============================

function bindEvents() {
  el.publishForm.addEventListener('submit', publishRecord);

  [
    el.artworkCode,
    el.sku,
    el.size,
    el.editionNumber,
    el.title,
    el.image,
    el.artist,
    el.frame,
    el.medium
  ].forEach((node) => {
    if (!node) return;
    node.addEventListener('input', () => {
      renderPreview(buildPreviewDraft());
    });
  });

  if (el.loadOrderBtn) {
    el.loadOrderBtn.addEventListener('click', loadOrderDetail);
  }

  if (el.orderId) {
    el.orderId.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        loadOrderDetail();
      }
    });
  }

  if (el.sku) {
    el.sku.addEventListener('input', () => {
      const code = extractArtworkCodeFromSku(el.sku.value);
      const size = extractSizeFromSku(el.sku.value);

      if (code) el.artworkCode.value = code;
      if (size && !el.size.value) el.size.value = size;

      renderPreview(buildPreviewDraft());
    });
  }
}

bindEvents();
</script>
